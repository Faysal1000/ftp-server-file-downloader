name: Build FTP Downloader Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: FTP-Downloader-Windows.exe
            artifact_path: dist/FTP-Downloader-Windows.exe
          - os: macos-latest
            artifact_name: FTP-Downloader-macOS-AppleSilicon.zip
            artifact_path: dist/FTP-Downloader-macOS-AppleSilicon.zip
          - os: ubuntu-latest
            artifact_name: FTP-Downloader-Linux
            artifact_path: dist/FTP-Downloader-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify Version Tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION_JSON=$(grep -o '"version": *"[^"]*"' version.json | cut -d '"' -f 4)
          if [ "$VERSION_JSON" != "${{ github.ref_name }}" ]; then
            echo "Error: GitHub tag (${{ github.ref_name }}) does not match version.json ($VERSION_JSON)"
            exit 1
          fi
          echo "Version matches!"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "FTP-Downloader" --add-data "frontend:frontend" main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "FTP-Downloader" --add-data "frontend;frontend" main.py

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          move dist\FTP-Downloader.exe "dist\${{ matrix.artifact_name }}"

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "${{ matrix.artifact_name }}" "FTP-Downloader.app"

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mv dist/FTP-Downloader "dist/${{ matrix.artifact_name }}"
          chmod +x "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SAMOnline FTP Downloader ${{ github.ref_name }}"
          body: |
            ## 📥 SAMOnline FTP Downloader

            Download the file for your operating system and run it!

            | File | Platform |
            |------|----------|
            | `FTP-Downloader-Windows.exe` | Windows 10/11 (64-bit) |
            | `FTP-Downloader-macOS-AppleSilicon` | macOS (Apple M1/M2/M3/M4) |
            | `FTP-Downloader-Linux` | Ubuntu / Debian / Fedora |

          files: artifacts/**/*
          draft: false
          prerelease: false
